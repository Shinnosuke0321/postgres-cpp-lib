name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, macos-latest, windows-latest ]
        compiler: [ gcc, clang, msvc ]
        build_type: [ Debug, Release ]
        include:
          # Linux GCC
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-14
            cxx: g++-14

          # Linux Clang
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-19
            cxx: clang++-19
            flag: libstdc++

          # Windows MSVC
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl

          # macOS GCC (via Homebrew)
          - os: macos-latest
            compiler: gcc
            cc: gcc-14
            cxx: g++-14

          # macOS LLVM Clang (via Homebrew) — paths resolved at configure time
          - os: macos-latest
            compiler: clang
            flag: libc++

        exclude:
          - os: ubuntu-24.04
            compiler: msvc
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang
          - os: macos-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            gcc-14 g++-14 \
            clang-19 clang-tools-19 libc++-19-dev libc++abi-19-dev \
            libpq-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja cmake llvm gcc postgresql@18
          echo "$(brew --prefix postgresql@18)/bin" >> $GITHUB_PATH

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install postgresql18 --params '/Password:postgres_ci_pw' -y --no-progress
          echo "C:\Program Files\PostgreSQL\18\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup PostgreSQL (Linux)
        if: runner.os == 'Linux'
        run: |
          docker compose -f tests/docker/docker-compose.yml up -d
          until [ "$(docker inspect --format='{{.State.Health.Status}}' postgres-test-db)" = "healthy" ]; do
            echo "Waiting for postgres..."; sleep 2
          done
          docker exec postgres-test-db psql -U test_user -d test_db \
            -f /dev/stdin < tests/docker/init_test_users.sql

      - name: Setup PostgreSQL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew services start postgresql@18
          sleep 5
          psql postgres -c "CREATE USER test_user WITH PASSWORD 'test_password';"
          psql postgres -c "CREATE DATABASE test_db OWNER test_user;"
          psql -d test_db -f tests/docker/init_test_users.sql

      - name: Setup PostgreSQL (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          PGPASSWORD: postgres_ci_pw
        run: |
          net start postgresql-x64-18
          sleep 5
          psql -U postgres -h localhost \
            -c "CREATE USER test_user WITH PASSWORD 'test_password';" \
            -c "CREATE DATABASE test_db OWNER test_user;"
          psql -U postgres -h localhost -d test_db -f tests/docker/init_test_users.sql

      - name: Configure
        shell: bash
        run: |
          CC_COMPILER="${{ matrix.cc }}"
          CXX_COMPILER="${{ matrix.cxx }}"
          CLANG_CXX_FLAGS=""
          SYSROOT_FLAG=""
          PG_HINT=""
          GENERATOR="-G Ninja"

          # Resolve Homebrew LLVM paths on macOS
          if [ "${{ runner.os }}" = "macOS" ] && [ "${{ matrix.compiler }}" = "clang" ]; then
            LLVM_PREFIX="$(brew --prefix llvm)"
            CC_COMPILER="${LLVM_PREFIX}/bin/clang"
            CXX_COMPILER="${LLVM_PREFIX}/bin/clang++"
            SYSROOT_FLAG="-DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)"
          fi

          if [ "${{ matrix.compiler }}" = "clang" ] && [ -n "${{ matrix.flag }}" ]; then
            CLANG_CXX_FLAGS="-DCMAKE_CXX_FLAGS=-stdlib=${{ matrix.flag }}"
          fi

          # Help CMake find the Homebrew PostgreSQL on macOS
          if [ "${{ runner.os }}" = "macOS" ]; then
            PG_PREFIX="$(brew --prefix postgresql@18)"
            PG_HINT="-DPostgreSQL_ROOT=${PG_PREFIX} -DPostgreSQL_LIBRARY=${PG_PREFIX}/lib/libpq.dylib -DPostgreSQL_INCLUDE_DIR=${PG_PREFIX}/include"
          fi

          # Use default VS generator on Windows (avoids Ninja PATH issues)
          if [ "${{ runner.os }}" = "Windows" ]; then
            GENERATOR=""
          fi

          cmake -S . -B build ${GENERATOR} \
            -DCMAKE_C_COMPILER="${CC_COMPILER}" \
            -DCMAKE_CXX_COMPILER="${CXX_COMPILER}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            ${CLANG_CXX_FLAGS} \
            ${SYSROOT_FLAG} \
            ${PG_HINT}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure
