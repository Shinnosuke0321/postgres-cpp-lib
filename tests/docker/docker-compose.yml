services:
  postgres:
    image: postgres:latest
    container_name: postgres-test-db
    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db

    volumes:
      # persistent database files
      - ../data:/var/lib/postgresql/data