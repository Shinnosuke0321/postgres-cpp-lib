services:
  postgres:
    image: postgres:18
    container_name: postgres-test-db
    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db

    volumes:
      # persistent database files
      - ../data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1" ]